      </style><article data-cangjie-content="true" data-zoom="1" style="position:relative;white-space:pre-wrap;word-wrap:break-word;cursor:text;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;color:rgb(44, 44, 43);font-family:&quot;zh quote&quot;, &quot;Helvetica Neue&quot;, -apple-system, &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, &quot;STHeiti&quot;, Helvetica, Arial, sans-serif, &quot;Apple Color Emoji&quot;;font-size:12pt;-webkit-font-smoothing:antialiased;font-variant-numeric:tabular-nums"><div><div data-cangjie-not-editable="true" class="ssr-d9eed3__sc-jd7ho1-0 iOTWXk with-bottom-line with-bottom" id="doc-title-area"><div class="ssr-d9eed3__sc-mo622a-2 ifvRpR"><div class="ssr-d9eed3__sc-mo622a-9 uHvpq"><div style="flex-grow:1" id="doc-title" data-cangjie-not-editable="true" class="sc-pdkQB eNujGe"><div style="style:[object Object]" id="doc-title-name" dir="auto" class="sc-pkDYi fPyLRl">Python 基础</div></div></div><div class="dingdoc-subtitle"><div class="ssr-d9eed3__sc-mo622a-0 guYEzX"><span class="ssr-d9eed3__sc-mo622a-8 jZUGOu"></span></div></div></div></div></div><div data-tag="probe-plugin" style="display:none;width:0;height:0"></div><div data-cangjie-key="0" data-cangjie-editable="true"><h2 id="4ever-bi-1" data-block-uuid="mn3artzavq0y9x2nz6c" data-cangjie-key="1" style="text-align:initial;text-indent:0;padding-left:0;padding-right:0;font-size:18pt" data-cangjie-leaf-block="true" data-type="heading-2" dir="auto" class="sc-pAZqv cuOtHq"><span data-cangjie-key="3:0" data-cangjie-leaf="true" data-testid="3:0">1.1 函数与装饰器机制</span></h2><h3 id="4ever-bi-4" data-block-uuid="mn3artzbsud39bv3vfe" data-cangjie-key="4" style="text-align:initial;text-indent:0;padding-left:0;padding-right:0;font-size:14.5pt" data-cangjie-leaf-block="true" data-type="heading-3" dir="auto" class="sc-pJurq cTjcEC"><span data-cangjie-key="6:0" data-cangjie-leaf="true" data-testid="6:0">装饰器的底层原理与 functools.wraps 的必要性</span></h3><h4 id="4ever-bi-7" data-block-uuid="mn3artzbdc9xxpwotlc" data-cangjie-key="7" style="text-align:initial;text-indent:0;padding-left:0;padding-right:0;font-size:13.5pt" data-cangjie-leaf-block="true" data-type="heading-4" dir="auto" class="sc-pRTZB cgrjKw"><span data-cangjie-key="9:0" data-cangjie-leaf="true" data-testid="9:0">1、基础题：装饰器是什么？</span></h4><div data-block-uuid="mn3artzbk9sb4a7blb9" data-cangjie-key="11" data-cangjie-leaf-block="true" data-type="paragraph" style="margin-top:12px;margin-bottom:12px;text-align:initial;text-indent:0;padding-left:0;padding-right:0" dir="auto" class="sc-prQdK inVUC"><span data-cangjie-key="12:0" data-cangjie-leaf="true" data-cangjie-mark="true" style="font-weight:bold" data-testid="12:0">难度级别</span><span data-cangjie-key="12:4" data-cangjie-leaf="true" data-testid="12:4">：⭐（装饰器定义、闭包原理、函数作为一等公民）</span></div><div data-block-uuid="mn3artzc2riim0qxu5n" data-cangjie-key="14" data-cangjie-leaf-block="true" data-type="paragraph" style="margin-top:12px;margin-bottom:12px;text-align:initial;text-indent:0;padding-left:0;padding-right:0" dir="auto" class="sc-prQdK inVUC"><span data-cangjie-key="15:0" data-cangjie-leaf="true" data-testid="15:0">装饰器本质上是一个</span><span data-cangjie-key="15:9" data-cangjie-leaf="true" data-cangjie-mark="true" style="font-weight:bold" data-testid="15:9">函数</span><span data-cangjie-key="15:11" data-cangjie-leaf="true" data-testid="15:11">，它接收另一个函数作为参数，返回一个新的函数。通过 </span><code data-block-uuid="mn3artzc8ozaa5f0ig4" data-cangjie-key="17" class="sc-fzoYHE iXwVqT"><span data-cangjie-key="18:0" data-cangjie-leaf="true" data-testid="18:0">@decorator</span></code><span data-cangjie-key="19:0" data-cangjie-leaf="true" data-testid="19:0"> 语法糖，可以在不修改原函数代码的情况下，给函数添加额外功能。</span></div><div data-block-uuid="mn3artzcsu55nsud95" data-cangjie-key="21" data-cangjie-leaf-block="true" data-type="paragraph" style="margin-top:12px;margin-bottom:12px;text-align:initial;text-indent:0;padding-left:0;padding-right:0" dir="auto" class="sc-prQdK inVUC"><span data-cangjie-key="22:0" data-cangjie-leaf="true" data-testid="22:0">底层原理是</span><span data-cangjie-key="22:5" data-cangjie-leaf="true" data-cangjie-mark="true" style="font-weight:bold" data-testid="22:5">闭包（Closure）</span><span data-cangjie-key="22:16" data-cangjie-leaf="true" data-testid="22:16">：装饰器内部定义的 wrapper 函数会持有对原函数的引用，形成一个闭包环境。当调用被装饰的函数时，实际调用的是 wrapper，wrapper 可以在调用原函数前后添加逻辑。</span></div><div data-cangjie-void="true" data-block-uuid="mn3artzcvg7jdt0o178" data-cangjie-key="23" data-cangjie-edge-selectable="true"><div data-type="hr" data-block-uuid="mn3artzcvg7jdt0o178" class="sc-pjstK jsIEAM"><div data-testid="horizon-line" data-type="hr" data-block-uuid="mn3artzcvg7jdt0o178" class="sc-pJkiN iihPlZ"><div style="display:flex" data-testid="line-with-slot"><div style="flex:1"></div><div style="display:flex;align-items:center"><div class="sc-pReKu eehIqb"><hr size="1" color="rgba(107, 114, 148, 0.32)" class="sc-oTBUA kBimvo"/></div></div><div style="flex:1"></div></div></div></div></div><h4 id="4ever-bi-25" data-block-uuid="mn3artzdw06e5q6iep" data-cangjie-key="25" style="text-align:initial;text-indent:0;padding-left:0;padding-right:0;font-size:13.5pt" data-cangjie-leaf-block="true" data-type="heading-4" dir="auto" class="sc-pRTZB cgrjKw"><span data-cangjie-key="27:0" data-cangjie-leaf="true" data-testid="27:0">2、进阶题：为什么要用 functools.wraps？</span></h4><div data-block-uuid="mn3artzdlp82v8u2mi" data-cangjie-key="29" data-cangjie-leaf-block="true" data-type="paragraph" style="margin-top:12px;margin-bottom:12px;text-align:initial;text-indent:0;padding-left:0;padding-right:0" dir="auto" class="sc-prQdK inVUC"><span data-cangjie-key="30:0" data-cangjie-leaf="true" data-cangjie-mark="true" style="font-weight:bold" data-testid="30:0">难度级别</span><span data-cangjie-key="30:4" data-cangjie-leaf="true" data-testid="30:4">：⭐⭐（元信息丢失问题、</span><span data-cangjie-key="30:16" data-cangjie-leaf="true" data-cangjie-mark="true" style="font-weight:bold" data-testid="30:16">name</span><span data-cangjie-key="30:20" data-cangjie-leaf="true" data-testid="30:20">/</span><span data-cangjie-key="30:21" data-cangjie-leaf="true" data-cangjie-mark="true" style="font-weight:bold" data-testid="30:21">doc</span><span data-cangjie-key="30:24" data-cangjie-leaf="true" data-testid="30:24">/</span><span data-cangjie-key="30:25" data-cangjie-leaf="true" data-cangjie-mark="true" style="font-weight:bold" data-testid="30:25">annotations</span><span data-cangjie-key="30:36" data-cangjie-leaf="true" data-testid="30:36">、函数签名）</span></div><div data-block-uuid="mn3artzes3we9rp54oh" data-cangjie-key="32" data-cangjie-leaf-block="true" data-type="paragraph" style="margin-top:12px;margin-bottom:12px;text-align:initial;text-indent:0;padding-left:0;padding-right:0" dir="auto" class="sc-prQdK inVUC"><span data-cangjie-key="33:0" data-cangjie-leaf="true" data-cangjie-mark="true" style="font-weight:bold" data-testid="33:0">1️⃣ Common Answer</span></div><div data-block-uuid="mn3artzesknw54qbf9j" data-cangjie-key="35" data-cangjie-leaf-block="true" data-type="paragraph" style="margin-top:12px;margin-bottom:12px;text-align:initial;text-indent:0;padding-left:0;padding-right:0" dir="auto" class="sc-prQdK inVUC"><span data-cangjie-key="36:0" data-cangjie-leaf="true" data-testid="36:0">装饰器会改变函数的 </span><code data-block-uuid="mn3artzep7k4lap37q" data-cangjie-key="38" class="sc-fzoYHE iXwVqT"><span data-cangjie-key="39:0" data-cangjie-leaf="true" data-testid="39:0">__name__</span></code><span data-cangjie-key="40:0" data-cangjie-leaf="true" data-testid="40:0">，所以用 </span><code data-block-uuid="mn3artzeayfr06tpmw" data-cangjie-key="42" class="sc-fzoYHE iXwVqT"><span data-cangjie-key="43:0" data-cangjie-leaf="true" data-testid="43:0">@functools.wraps</span></code><span data-cangjie-key="44:0" data-cangjie-leaf="true" data-testid="44:0"> 把原函数的名字复制过来。不然调试的时候看到的都是 wrapper，不知道是哪个函数。还有 </span><code data-block-uuid="mn3artze2z0y0zf0wm5" data-cangjie-key="46" class="sc-fzoYHE iXwVqT"><span data-cangjie-key="47:0" data-cangjie-leaf="true" data-testid="47:0">__doc__</span></code><span data-cangjie-key="48:0" data-cangjie-leaf="true" data-testid="48:0"> 也会丢，所以要用 wraps 保留这些信息。</span></div><div data-block-uuid="mn3artze2c91ppdqnbp" data-cangjie-key="50" data-cangjie-leaf-block="true" data-type="paragraph" style="margin-top:12px;margin-bottom:12px;text-align:initial;text-indent:0;padding-left:0;padding-right:0" dir="auto" class="sc-prQdK inVUC"><span data-cangjie-key="51:0" data-cangjie-leaf="true" data-cangjie-mark="true" style="font-weight:bold" data-testid="51:0">2️⃣ Impressive Answer</span></div><div data-block-uuid="mn3artzf4ptkmm8sr3b" data-cangjie-key="53" data-cangjie-leaf-block="true" data-type="paragraph" style="margin-top:12px;margin-bottom:12px;text-align:initial;text-indent:0;padding-left:0;padding-right:0" dir="auto" class="sc-prQdK inVUC"><span data-cangjie-key="54:0" data-cangjie-leaf="true" data-testid="54:0">我会从三个角度思考这个问题：</span></div><div style="margin-top:2.667px;margin-bottom:2.667px;padding-left:0;text-align:initial;background-color:" class="sc-prOVx fhJTkO" data-testid="list" data-listid="si8ki4pgrm" data-level="0" data-isordered="true" data-istasklist="false" data-ischecked="false" data-iscanceled="false" data-format="decimal" data-text="%1." data-align="left" data-backgroundimage=""><div data-testid="group-list-container" style="display:contents" class="sc-qQmou jqDvEh"><span data-testid="list-symbol-wrapper" class="sc-pjSSY kQVMym symbol-align-left list-symbol-wrapper" style="font-size:12pt;background:unset"><span data-testid="list-symbol" class="list-symbol">1.</span></span><div data-block-uuid="mn3artzfvyyersthqyj" data-cangjie-key="56" data-cangjie-leaf-block="true" style="margin-top:0;margin-bottom:0;flex-grow:1;text-align:initial;text-indent:0;padding-left:0;padding-right:0" data-type="paragraph" dir="auto" class="sc-prQdK inVUC"><span data-cangjie-key="57:0" data-cangjie-leaf="true" data-cangjie-mark="true" style="font-weight:bold" data-testid="57:0">首先是元信息丢失的问题</span><span data-cangjie-key="57:11" data-cangjie-leaf="true" data-testid="57:11">。装饰器本质是返回一个新函数，原函数的 </span><code data-block-uuid="mn3artzfs1ecgip98l" data-cangjie-key="59" class="sc-fzoYHE iXwVqT"><span data-cangjie-key="60:0" data-cangjie-leaf="true" data-testid="60:0">__name__</span></code><span data-cangjie-key="61:0" data-cangjie-leaf="true" data-testid="61:0">、</span><code data-block-uuid="mn3artzfq3mjcp0l7m" data-cangjie-key="63" class="sc-fzoYHE iXwVqT"><span data-cangjie-key="64:0" data-cangjie-leaf="true" data-testid="64:0">__doc__</span></code><span data-cangjie-key="65:0" data-cangjie-leaf="true" data-testid="65:0">、</span><code data-block-uuid="mn3artzfpgvqshp0d3" data-cangjie-key="67" class="sc-fzoYHE iXwVqT"><span data-cangjie-key="68:0" data-cangjie-leaf="true" data-testid="68:0">__annotations__</span></code><span data-cangjie-key="69:0" data-cangjie-leaf="true" data-testid="69:0"> 等元信息都会被 wrapper 覆盖。这会导致调试困难、文档失效、函数签名丢失。</span></div></div></div><div style="margin-top:2.667px;margin-bottom:2.667px;padding-left:0;text-align:initial;background-color:" class="sc-prOVx fhJTkO" data-testid="list" data-listid="si8ki4pgrm" data-level="0" data-isordered="true" data-istasklist="false" data-ischecked="false" data-iscanceled="false" data-format="decimal" data-text="%1." data-align="left" data-backgroundimage=""><div data-testid="group-list-container" style="display:contents" class="sc-qQmou jqDvEh"><span data-testid="list-symbol-wrapper" class="sc-pjSSY kQVMym symbol-align-left list-symbol-wrapper" style="font-size:12pt;background:unset"><span data-testid="list-symbol" class="list-symbol">2.</span></span><div data-block-uuid="mn3artzgwl7iy8t7w" data-cangjie-key="71" data-cangjie-leaf-block="true" style="margin-top:0;margin-bottom:0;flex-grow:1;text-align:initial;text-indent:0;padding-left:0;padding-right:0" data-type="paragraph" dir="auto" class="sc-prQdK inVUC"><span data-cangjie-key="72:0" data-cangjie-leaf="true" data-cangjie-mark="true" style="font-weight:bold" data-testid="72:0">其次是 functools.wraps 的作用</span><span data-cangjie-key="72:23" data-cangjie-leaf="true" data-testid="72:23">。它是一个装饰器，通过 </span><code data-block-uuid="mn3artzgjd7t47azxh" data-cangjie-key="74" class="sc-fzoYHE iXwVqT"><span data-cangjie-key="75:0" data-cangjie-leaf="true" data-testid="75:0">update_wrapper</span></code><span data-cangjie-key="76:0" data-cangjie-leaf="true" data-testid="76:0"> 函数把原函数的元信息复制到 wrapper 上，包括 </span><code data-block-uuid="mn3artzg6l2zsyn3x7" data-cangjie-key="78" class="sc-fzoYHE iXwVqT"><span data-cangjie-key="79:0" data-cangjie-leaf="true" data-testid="79:0">__name__</span></code><span data-cangjie-key="80:0" data-cangjie-leaf="true" data-testid="80:0">、</span><code data-block-uuid="mn3artzgr2t8lazi2un" data-cangjie-key="82" class="sc-fzoYHE iXwVqT"><span data-cangjie-key="83:0" data-cangjie-leaf="true" data-testid="83:0">__doc__</span></code><span data-cangjie-key="84:0" data-cangjie-leaf="true" data-testid="84:0">、</span><code data-block-uuid="mn3artzgnsdq1w4744" data-cangjie-key="86" class="sc-fzoYHE iXwVqT"><span data-cangjie-key="87:0" data-cangjie-leaf="true" data-testid="87:0">__module__</span></code><span data-cangjie-key="88:0" data-cangjie-leaf="true" data-testid="88:0">、</span><code data-block-uuid="mn3artzgk1u8iissrf" data-cangjie-key="90" class="sc-fzoYHE iXwVqT"><span data-cangjie-key="91:0" data-cangjie-leaf="true" data-testid="91:0">__annotations__</span></code><span data-cangjie-key="92:0" data-cangjie-leaf="true" data-testid="92:0"> 以及 </span><code data-block-uuid="mn3artzgcmvqm1dcj6e" data-cangjie-key="94" class="sc-fzoYHE iXwVqT"><span data-cangjie-key="95:0" data-cangjie-leaf="true" data-testid="95:0">__dict__</span></code><span data-cangjie-key="96:0" data-cangjie-leaf="true" data-testid="96:0"> 属性。</span></div></div></div><div style="margin-top:2.667px;margin-bottom:2.667px;padding-left:0;text-align:initial;background-color:" class="sc-prOVx fhJTkO" data-testid ymbol" class="list-symbol">1.</span></span><div data-block-uuid="mn3artzlszm89clwny9" data-cangjie-key="205" data-cangjie-leaf-block="true" style="margin-top:0;margin-bottom:0;flex-grow:1;text-align:initial;text-indent:0;padding-left:0;padding-right:0" data-type="paragraph" dir="auto" class="sc-prQdK inVUC"><span data-cangjie-key="206:0" data-cangjie-leaf="true" data-cangjie-mark="true" style="font-weight:bold" data-testid="206:0">首先是工具注册失败</span><span data-cangjie-key="206:9" data-cangjie-leaf="true" data-testid="206:9">。LangChain 的 </span><code data-block-uuid="mn3artzlugdxo1xw65" data-cangjie-key="208" class="sc-fzoYHE iXwVqT"><span data-cangjie-key="209:0" data-cangjie-leaf="true" data-testid="209:0">@tool</span></code><span data-cangjie-key="210:0" data-cangjie-leaf="true" data-testid="210:0"> 装饰器会读取函数的 </span><code data-block-uuid="mn3artzl87mv62yn6d" data-cangjie-key="212" class="sc-fzoYHE iXwVqT"><span data-cangjie-key="213:0" data-cangjie-leaf="true" data-testid="213:0">__name__</span></code><span data-cangjie-key="214:0" data-cangjie-leaf="true" data-testid="214:0"> 作为工具名称，</span><code data-block-uuid="mn3artzl61pne7195dd" data-cangjie-key="216" class="sc-fzoYHE iXwVqT"><span data-cangjie-key="217:0" data-cangjie-leaf="true" data-testid="217:0">__doc__</span></code><span data-cangjie-key="218:0" data-cangjie-leaf="true" data-testid="218:0"> 作为工具描述。如果不用 wraps，这两个都是空的，工具注册时会抛出异常或生成无效的工具定义。</span></div></div></div><div style="margin-top:2.667px;margin-bottom:2.667px;padding-left:0;text-align:initial;background-color:" class="sc-prOVx fhJTkO" data-testid="list" data-listid="fuhephur76q" data-level="0" data-isordered="true" data-istasklist="false" data-ischecked="false" data-iscanceled="false" data-format="decimal" data-text="%1." data-align="left" data-backgroundimage=""><div data-testid="group-list-container" style="display:contents" class="sc-qQmou jqDvEh"><span data-testid="list-symbol-wrapper" class="sc-pjSSY kQVMym symbol-align-left list-symbol-wrapper" s margin-top:0;margin-bottom:0;flex-grow:1;text-align:initial;text-indent:0;padding-left:0;padding-right:0" data-type="paragraph" dir="auto" class="sc-prQdK inVUC"><span data-cangjie-key="232:0" data-cangjie-leaf="true" data-cangjie-mark="true" style="font-weight:bold" data-testid="232:0">最后是 Tracing 和调试困难</span><span data-cangjie-key="232:17" data-cangjie-leaf="true" data-testid="232:17">。LangSmith 等 Tracing 工具依赖函数名来构建调用链。如果所有工具都叫 wrapper，Trace 链路会变得无法阅读，调试成本大幅上升。</span></div></div></div><div data-block-uuid="mn3artznrjpue9qil7" data-cangjie-key="234" data-cangjie-leaf-block="true" data-type="paragraph" style="margin-top:12px;margin-bottom:12px;text-align:initial;text-indent:0;padding-left:0;padding-right:0" dir="auto" class="sc-prQdK inVUC"><span data-cangjie-key="235:0" data-cangjie-leaf="true" data-cangjie-mark="true" style="font-weight:bold" data-testid="235:0">3️⃣ Key Differences</span></div><div data-block-uuid="mn3artznrydu0gmjuq" data-cangjie-key="236" data-cangjie-edge-selectable="true" data-type="table" data-custom-selection="true" data-hover-box="customBox" style="padding-top:16px;padding-bottom:8px;position:relative"><div style="position:relative"><div class="sc-fzoaKM hyXHRj table-scroll-container" data-plugin-scrollable="true"><div class="sc-fzoVTD Atfvz"><table style="left:0px;border:unset;border-top-width:unset;width:648px" class="sc-fzqAui eoGDzK"><colgroup><col width="216"/><col width="216"/><col width="216"/></colgroup><tbody><tr data-block-uuid="mn3artzn55ujn3jra4p" data-cangjie-key="237" style="height:33px" data-sticky="false" class="sc-fzpisO jHQZJv"><td data-block-uuid="mn3artznh7s0ltk9wn4" data-cangjie-key="239" data-type="table-cell" rowspan="1" colSpan="1" style="border-top:1px solid var(--we_line_heavy_color, rgba(23, 26, 29, 0.14));border-right:1px solid var(--we_line_heavy_color, rgba(23, 26, 29, 0.14));border-bottom:1px solid var(--we_line_heavy_color, rgba(23, 26, 29, 0.14));border-left:1px solid var(--we_line_heavy_color, rgba(23, 26,
