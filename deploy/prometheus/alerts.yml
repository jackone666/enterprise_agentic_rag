# Enterprise Agentic RAG — Prometheus Alerting Rules
# Generated by observability/prometheus_alerts.py
#
# Load with:
#   promtool check rules deploy/prometheus/alerts.yml
#   curl -X POST http://localhost:9090/-/reload

groups:
  - name: enterprise_rag_latency
    rules:
      # ── P95 latency alerts ──
      - alert: HighP95Latency
        expr: histogram_quantile(0.95, rate(rag_request_latency_seconds_bucket[5m])) > 10
        for: 5m
        labels:
          severity: warning
          component: rag_pipeline
        annotations:
          summary: "RAG pipeline P95 latency exceeds 10 seconds"
          description: "P95 latency is {{ $value | humanize }}s over the last 5 minutes. Check retrieval backend and LLM provider health."

      - alert: CriticalP95Latency
        expr: histogram_quantile(0.95, rate(rag_request_latency_seconds_bucket[5m])) > 30
        for: 3m
        labels:
          severity: critical
          component: rag_pipeline
        annotations:
          summary: "RAG pipeline P95 latency critically high ({{ $value }}s)"
          description: "Immediate investigation required. Check downstream service availability."

  - name: enterprise_rag_errors
    rules:
      # ── Error rate alerts ──
      - alert: HighErrorRate
        expr: rate(rag_request_errors_total[5m]) / rate(rag_requests_total[5m]) > 0.10
        for: 5m
        labels:
          severity: warning
          component: rag_pipeline
        annotations:
          summary: "RAG error rate exceeds 10%"
          description: "Error rate is {{ $value | humanizePercentage }}. Check logs for failure patterns."

      - alert: CriticalErrorRate
        expr: rate(rag_request_errors_total[5m]) / rate(rag_requests_total[5m]) > 0.25
        for: 3m
        labels:
          severity: critical
          component: rag_pipeline
        annotations:
          summary: "RAG error rate critically high ({{ $value | humanizePercentage }})"
          description: "More than 25% of requests are failing. Consider rollback or emergency fix."

      # ── Tool failure rate ──
      - alert: HighToolFailureRate
        expr: rate(rag_tool_errors_total[5m]) / rate(rag_tool_calls_total[5m]) > 0.15
        for: 5m
        labels:
          severity: warning
          component: tool_executor
        annotations:
          summary: "Tool execution failure rate exceeds 15%"
          description: "{{ $value | humanizePercentage }} of tool calls are failing. Check external service integrations."

  - name: enterprise_rag_retrieval
    rules:
      # ── Retrieval quality alerts ──
      - alert: LowRetrievalQuality
        expr: avg(rag_retrieval_top_score) < 0.05
        for: 10m
        labels:
          severity: warning
          component: retrieval
        annotations:
          summary: "Retrieval quality is low (avg top score < 0.05)"
          description: "Documents retrieved have very low relevance. Check index health and embedding quality."

      - alert: HighNoDocRate
        expr: rate(rag_no_doc_retrievals_total[10m]) / rate(rag_retrievals_total[10m]) > 0.20
        for: 10m
        labels:
          severity: warning
          component: retrieval
        annotations:
          summary: "Retrieval returning no documents for >20% of queries"
          description: "{{ $value | humanizePercentage }} of retrievals return no documents. Check ingestion pipeline."

      # ── Fallback rate alerts ──
      - alert: HighFallbackRate
        expr: rate(rag_fallback_total[10m]) / rate(rag_requests_total[10m]) > 0.25
        for: 10m
        labels:
          severity: warning
          component: recovery
        annotations:
          summary: "Fallback rate exceeds 25%"
          description: "{{ $value | humanizePercentage }} of requests are triggering fallback. Check primary retrieval path."

  - name: enterprise_rag_verification
    rules:
      # ── Verification alerts ──
      - alert: LowVerificationPassRate
        expr: rate(rag_verification_pass_total[10m]) / rate(rag_verification_total[10m]) < 0.85
        for: 10m
        labels:
          severity: warning
          component: verifier
        annotations:
          summary: "Answer verification pass rate below 85%"
          description: "Only {{ $value | humanizePercentage }} of answers pass verification. Check retrieval quality and LLM grounding."

      - alert: HighHallucinationRate
        expr: rag_hallucination_rate > 0.15
        for: 10m
        labels:
          severity: critical
          component: verifier
        annotations:
          summary: "Hallucination rate exceeds 15%"
          description: "{{ $value | humanizePercentage }} of claims are flagged as hallucinated. Immediate investigation required."

  - name: enterprise_rag_system
    rules:
      # ── System health alerts ──
      - alert: ServiceDown
        expr: up{job="enterprise_rag"} == 0
        for: 1m
        labels:
          severity: critical
          component: infrastructure
        annotations:
          summary: "Enterprise RAG service is down"
          description: "The /health endpoint is not responding. Check pod/container status."

      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes{job="enterprise_rag"} / 1024 / 1024 / 1024 > 20
        for: 5m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "Memory usage exceeds 20 GB"
          description: "Process memory is {{ $value }} GB. Check for memory leaks."

      - alert: CacheHitRateDrop
        expr: rate(rag_cache_hits_total[10m]) / rate(rag_cache_requests_total[10m]) < 0.3
        for: 10m
        labels:
          severity: info
          component: cache
        annotations:
          summary: "Semantic cache hit rate below 30%"
          description: "Cache hit rate is {{ $value | humanizePercentage }}. Consider adjusting similarity threshold."
