global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # OpenTelemetry Collector internal metrics
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]

  # Enterprise RAG application metrics (when prometheus_client is enabled)
  - job_name: "enterprise-rag"
    static_configs:
      - targets: ["host.docker.internal:8000"]
    metrics_path: /metrics
    scrape_interval: 10s
